<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunch Workout</title>
  <style>
    :root {
      --bg: #1a1512;
      --surface: #2a2218;
      --text-primary: #f5f0ea;
      --text-muted: #8a7a6a;
      --accent: #f59e0b;
      --accent-glow: rgba(245, 158, 11, 0.125);
    }

    :root.light {
      --bg: #f5f0ea;
      --surface: #e8e0d4;
      --text-primary: #1a1512;
      --text-muted: #8a7a6a;
      --accent: #d97706;
      --accent-glow: rgba(217, 119, 6, 0.15);
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      margin: 0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 400px;
      width: 100%;
      padding: 32px 16px;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .session-pills {
      display: flex;
      flex-direction: row;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .pill {
      padding: 8px 20px;
      border-radius: 24px;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 15px;
      cursor: pointer;
      border: 1px solid transparent;
      user-select: none;
      transition: opacity 0.15s ease;
    }

    .pill:active {
      opacity: 0.7;
    }

    .pill.active {
      background: var(--accent-glow);
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .pill.completed {
      color: var(--accent);
      opacity: 0.5;
    }

    .ring-container {
      position: relative;
      width: min(260px, 70vw);
      height: min(260px, 70vw);
      margin: 32px auto;
    }

    .ring-track {
      fill: none;
      stroke: var(--surface);
      stroke-width: 24;
    }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 24;
      stroke-linecap: round;
      stroke-dasharray: 666.11; /* 2 * PI * 106 */
      stroke-dashoffset: 666.11; /* fully empty */
      transform: rotate(-90deg);
      transform-origin: center;
    }

    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 52px;
      font-weight: 200;
      color: var(--text-primary);
      white-space: nowrap;
      transition: text-shadow 0.3s ease;
    }

    .timer-display.running {
      text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
    }

    .time-selector {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      justify-content: center;
      transition: opacity 0.2s ease;
    }

    .time-selector.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .time-selector span {
      font-size: 18px;
      color: var(--text-primary);
      min-width: 60px;
      text-align: center;
    }

    .time-selector button {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--surface);
      color: var(--text-primary);
      font-size: 22px;
      border: none;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .time-selector button:hover {
      opacity: 0.8;
    }

    .time-selector button:active {
      background: var(--accent);
      color: var(--bg);
    }

    .action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg);
      border: none;
      cursor: pointer;
      margin: 24px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-btn.next-btn {
      width: auto;
      height: auto;
      padding: 16px 40px;
      border-radius: 32px;
      font-size: 18px;
      color: var(--bg);
      font-weight: 600;
    }

    .action-btn:hover {
      opacity: 0.9;
    }

    .action-btn:active {
      transform: scale(0.95);
    }

    .cancel-btn {
      background: none;
      border: 1px solid var(--text-muted);
      color: var(--text-muted);
      padding: 12px 32px;
      border-radius: 32px;
      font-size: 16px;
      font-family: system-ui, sans-serif;
      cursor: pointer;
      margin: 24px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cancel-btn:active {
      opacity: 0.7;
    }

    .toggles-row {
      display: flex;
      gap: 10px;
      margin-top: 32px;
    }

    .voice-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--surface);
      border: none;
      font-family: system-ui, sans-serif;
      transition: color 0.2s ease;
    }

    .voice-toggle.active {
      color: var(--accent);
    }

    .voice-toggle svg {
      width: 20px;
      height: 20px;
    }

    .theme-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      padding: 8px;
      border-radius: 20px;
      background: var(--surface);
      border: none;
      transition: color 0.2s ease;
    }

    .theme-btn svg {
      width: 20px;
      height: 20px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1 style="font-size:32px;font-weight:600;color:var(--text-primary);margin:0 0 24px 0;letter-spacing:0.5px;">Lunch Workout</h1>
    <div class="session-pills">
      <div class="pill active" id="pill-0">Plankan</div>
      <div class="pill" id="pill-1">Jägarvila</div>
      <div class="pill" id="pill-2">Push-ups</div>
    </div>

    <div class="ring-container">
      <svg viewBox="0 0 260 260" width="100%" height="100%">
        <circle class="ring-track" cx="130" cy="130" r="106" />
        <circle class="ring-progress" id="ring-progress" cx="130" cy="130" r="106" />
      </svg>
      <div class="timer-display" id="timer-display">2:00</div>
    </div>

    <div class="time-selector" id="time-selector">
      <button id="btn-minus">−</button>
      <span id="duration-label">2:00</span>
      <button id="btn-plus">+</button>
    </div>

    <button class="action-btn" id="action-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="6,3 20,12 6,21" />
      </svg>
    </button>
    <button class="cancel-btn hidden" id="cancel-btn">Cancel</button>

    <div class="toggles-row">
    <button class="voice-toggle active" id="voice-toggle">
      <svg id="voice-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
      <svg id="voice-icon-off" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <line x1="23" y1="9" x2="17" y2="15"></line>
        <line x1="17" y1="9" x2="23" y2="15"></line>
      </svg>
      <span id="voice-label">Voice on</span>
    </button>
    <button class="voice-toggle" id="wake-toggle">
      <svg id="wake-icon-on" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
        <line x1="12" y1="18" x2="12.01" y2="18"></line>
      </svg>
      <svg id="wake-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
        <line x1="12" y1="18" x2="12.01" y2="18"></line>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>
      <span id="wake-label">Screen lock off</span>
    </button>
    <button class="theme-btn" id="theme-toggle">
      <svg id="theme-icon-sun" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    </div>
  </div>

  <script>
    const sessions = [
      { name: 'Plankan', default: 120, min: 15, max: 300, step: 15 },
      { name: 'Jägarvila', default: 120, min: 15, max: 300, step: 15 },
      { name: 'Push-ups', default: 30, min: 10, max: 60, step: 10 },
    ];

    let currentSession = 0;
    let durations = sessions.map(s => s.default);
    let state = 'ready'; // 'ready' | 'running' | 'completed'
    let voiceEnabled = true;

    const pills = [
      document.getElementById('pill-0'),
      document.getElementById('pill-1'),
      document.getElementById('pill-2'),
    ];
    const timerDisplay = document.getElementById('timer-display');
    const durationLabel = document.getElementById('duration-label');
    const timeSelector = document.getElementById('time-selector');
    const actionBtn = document.getElementById('action-btn');
    const btnMinus = document.getElementById('btn-minus');
    const btnPlus = document.getElementById('btn-plus');
    const ringProgress = document.getElementById('ring-progress');
    const cancelBtn = document.getElementById('cancel-btn');
    const CIRCUMFERENCE = 2 * Math.PI * 106;

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    const playIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>';

    // --- Mutable timer state ---
    let animFrameId = null;
    let startTime = null;
    let totalDuration = 0;
    let lastAnnouncedThreshold = null;

    function renderSession() {
      if (animFrameId) {
        cancelAnimationFrame(animFrameId);
        animFrameId = null;
      }

      pills.forEach((pill, i) => {
        pill.classList.toggle('active', i === currentSession);
        pill.classList.toggle('completed', i < currentSession);
      });

      const dur = durations[currentSession];
      durationLabel.textContent = formatTime(dur);

      if (state === 'ready') {
        timerDisplay.textContent = formatTime(dur);
        timerDisplay.classList.remove('running');
        timeSelector.classList.remove('fade-out');
        ringProgress.style.strokeDashoffset = CIRCUMFERENCE;
        actionBtn.className = 'action-btn';
        actionBtn.innerHTML = playIcon;
        actionBtn.classList.remove('hidden');
        cancelBtn.classList.add('hidden');
      } else if (state === 'running') {
        timerDisplay.classList.add('running');
        timeSelector.classList.add('fade-out');
        actionBtn.classList.add('hidden');
        cancelBtn.classList.remove('hidden');
      } else if (state === 'completed') {
        timerDisplay.classList.remove('running');
        timeSelector.classList.add('fade-out');
        const label = currentSession < sessions.length - 1 ? 'Next' : 'Restart';
        actionBtn.className = 'action-btn next-btn';
        actionBtn.textContent = label;
        actionBtn.classList.remove('hidden');
        cancelBtn.classList.add('hidden');
      }
    }

    btnMinus.addEventListener('click', () => {
      const s = sessions[currentSession];
      durations[currentSession] = Math.max(s.min, durations[currentSession] - s.step);
      renderSession();
    });

    btnPlus.addEventListener('click', () => {
      const s = sessions[currentSession];
      durations[currentSession] = Math.min(s.max, durations[currentSession] + s.step);
      renderSession();
    });

    actionBtn.addEventListener('click', () => {
      if (state === 'ready') {
        startTimer();
      } else if (state === 'completed') {
        if (currentSession < sessions.length - 1) {
          currentSession++;
          state = 'ready';
          renderSession();
        } else {
          currentSession = 0;
          durations = sessions.map(s => s.default);
          state = 'ready';
          renderSession();
        }
        if (window.speechSynthesis) speechSynthesis.cancel();
      }
    });

    cancelBtn.addEventListener('click', () => {
      if (state === 'running') {
        if (window.speechSynthesis) speechSynthesis.cancel();
        state = 'ready';
        renderSession();
      }
    });

    pills.forEach((pill, i) => {
      pill.addEventListener('click', () => {
        if (i === currentSession && state === 'ready') return;
        if (window.speechSynthesis) speechSynthesis.cancel();
        currentSession = i;
        state = 'ready';
        renderSession();
      });
    });

    const voiceToggle = document.getElementById('voice-toggle');
    const voiceIconOn = document.getElementById('voice-icon-on');
    const voiceIconOff = document.getElementById('voice-icon-off');
    const voiceLabel = document.getElementById('voice-label');

    voiceToggle.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      voiceToggle.classList.toggle('active', voiceEnabled);
      voiceIconOn.classList.toggle('hidden', !voiceEnabled);
      voiceIconOff.classList.toggle('hidden', voiceEnabled);
      voiceLabel.textContent = voiceEnabled ? 'Voice on' : 'Voice off';
      if (!voiceEnabled && window.speechSynthesis) speechSynthesis.cancel();
    });

    // --- Screen Wake Lock ---
    const wakeToggle = document.getElementById('wake-toggle');
    const wakeIconOn = document.getElementById('wake-icon-on');
    const wakeIconOff = document.getElementById('wake-icon-off');
    const wakeLabel = document.getElementById('wake-label');
    let wakeLock = null;

    if (!('wakeLock' in navigator)) {
      wakeToggle.style.display = 'none';
    }

    async function requestWakeLock() {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {
          wakeLock = null;
          updateWakeUI(false);
        });
        updateWakeUI(true);
      } catch (e) {
        updateWakeUI(false);
      }
    }

    function releaseWakeLock() {
      if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
      }
      updateWakeUI(false);
    }

    function updateWakeUI(on) {
      wakeToggle.classList.toggle('active', on);
      wakeIconOn.classList.toggle('hidden', !on);
      wakeIconOff.classList.toggle('hidden', on);
      wakeLabel.textContent = on ? 'Screen lock off' : 'Screen lock on';
    }

    wakeToggle.addEventListener('click', () => {
      if (wakeLock) {
        releaseWakeLock();
      } else {
        requestWakeLock();
      }
    });

    // Re-acquire wake lock when tab becomes visible again
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && wakeLock === null && wakeToggle.classList.contains('active')) {
        requestWakeLock();
      }
    });

    // --- Theme Toggle ---
    const themeToggle = document.getElementById('theme-toggle');
    const themeIconSun = document.getElementById('theme-icon-sun');
    const themeIconMoon = document.getElementById('theme-icon-moon');
    let isDark = true;

    themeToggle.addEventListener('click', () => {
      isDark = !isDark;
      document.documentElement.classList.toggle('light', !isDark);
      themeIconSun.classList.toggle('hidden', isDark);
      themeIconMoon.classList.toggle('hidden', !isDark);
    });

    function speak(text) {
      if (!voiceEnabled) return;
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 1.0;
      speechSynthesis.speak(utterance);
    }

    function timeToWords(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      const parts = [];
      if (m > 0) parts.push(m === 1 ? 'one minute' : `${m} minutes`);
      if (s > 0) parts.push(`${s} seconds`);
      return parts.length ? parts.join(' ') + ' remaining' : '';
    }

    function announceTime(remaining, displaySeconds) {
      let threshold = null;

      if (displaySeconds <= 0) {
        threshold = 0;
      } else if (displaySeconds <= 5) {
        threshold = displaySeconds; // 5,4,3,2,1
      } else if (displaySeconds === 10) {
        threshold = 10;
      } else if (displaySeconds === 15) {
        threshold = 15;
      } else if (displaySeconds % 30 === 0 && displaySeconds > 15) {
        threshold = displaySeconds;
      }

      if (threshold === null) return;
      if (threshold === lastAnnouncedThreshold) return;
      if (threshold === totalDuration) return; // Don't announce at start value

      lastAnnouncedThreshold = threshold;

      if (threshold === 0) {
        if (currentSession === sessions.length - 1) {
          speak('zero, Well done everybody!');
        } else {
          speak('zero, and the session is completed');
        }
      } else if (threshold <= 5) {
        speak(String(threshold));
      } else if (threshold === 10) {
        speak('ten');
      } else if (threshold === 15) {
        speak('fifteen seconds');
      } else {
        speak(timeToWords(threshold));
      }
    }

    function startTimer() {
      state = 'running';
      totalDuration = durations[currentSession];
      startTime = performance.now();
      lastAnnouncedThreshold = null;
      speak('start');
      renderSession();
      tick();
    }

    function tick() {
      const elapsed = (performance.now() - startTime) / 1000;
      const remaining = Math.max(0, totalDuration - elapsed);
      const displaySeconds = Math.ceil(remaining);

      timerDisplay.textContent = formatTime(displaySeconds);
      ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (remaining / totalDuration);

      if (remaining <= 0) {
        timerDisplay.textContent = '0:00';
        ringProgress.style.strokeDashoffset = 0;
        announceTime(0, 0);
        state = 'completed';
        renderSession();
        return;
      }

      announceTime(remaining, displaySeconds);
      animFrameId = requestAnimationFrame(tick);
    }

    renderSession();
  </script>
</body>
</html>
